<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thread Sequence | StringArt Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background-color: #ffffff; 
            color: #3c4043; 
            font-family: 'Google Sans', sans-serif; 
            margin: 0;
            line-height: 1.2;
            -webkit-print-color-adjust: exact;
            font-size: 12px;
        }
        
        /* Optimization for Page Layout */
        .page-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .sequence-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr); /* Fixed 10 columns for neatness */
            gap: 6px;
            padding: 10px 0 30px 0;
        }

        .step-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #eef0f2;
            border-radius: 6px;
            padding: 4px 0;
            background: #fff;
            break-inside: avoid;
        }

        .step-index {
            font-size: 8px;
            color: #bdc1c6;
            font-weight: bold;
        }

        .nail-number {
            font-size: 13px;
            font-weight: 700;
            color: #1a73e8;
        }

        .section-header {
            background: #f8fbff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            color: #4285f4;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e8f0fe;
        }

        /* Logic for exactly 300 per page */
        .page-break-wrapper {
            break-after: page;
            border-bottom: 2px dashed #eee;
            margin-bottom: 40px;
            padding-bottom: 20px;
        }

        @media print {
            .no-print { display: none !important; }
            .page-container { padding: 0; max-width: 100%; }
            .page-break-wrapper { 
                border-bottom: none; 
                margin-bottom: 0; 
                padding-bottom: 0;
            }
            .step-node { border: 1px solid #d1d5db; } /* Darker borders for printing */
        }
    </style>
</head>
<body>

    <main class="page-container">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6 no-print">
            <div>
                <h1 class="text-2xl font-medium text-gray-900">Sequence Map</h1>
                <p class="text-gray-500 text-xs">Formatted for 300 steps per page.</p>
            </div>
            <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium text-sm flex items-center gap-2">
                <i data-lucide="printer" class="w-4 h-4"></i> Print Sequence
            </button>
        </header>

        <div id="master-container">
            <!-- Content generated by script below -->
        </div>

        <script>
            const master = document.getElementById('master-container');
            const totalSteps = 1200; // Simulated total
            const stepsPerPage = 300;
            const stepsPerSection = 100;

            for (let p = 0; p < Math.ceil(totalSteps / stepsPerPage); p++) {
                const pageWrapper = document.createElement('div');
                pageWrapper.className = 'page-break-wrapper';
                
                // Page Label
                const pageLabel = document.createElement('div');
                pageLabel.className = 'text-[10px] text-gray-400 mb-2 uppercase tracking-widest font-bold';
                pageLabel.innerText = `Sheet ${p + 1} (Steps ${p * stepsPerPage + 1} - ${(p + 1) * stepsPerPage})`;
                pageWrapper.appendChild(pageLabel);

                for (let s = 0; s < (stepsPerPage / stepsPerSection); s++) {
                    const startIdx = (p * stepsPerPage) + (s * stepsPerSection) + 1;
                    const endIdx = startIdx + stepsPerSection - 1;

                    if (startIdx > totalSteps) break;

                    // Section Header
                    const head = document.createElement('div');
                    head.className = 'section-header';
                    head.innerHTML = `<span>Segment ${s + 1}</span><span>Nails ${startIdx} to ${endIdx}</span>`;
                    pageWrapper.appendChild(head);

                    // Grid
                    const grid = document.createElement('div');
                    grid.className = 'sequence-grid';

                    for (let i = startIdx; i <= endIdx; i++) {
                        if (i > totalSteps) break;
                        const node = document.createElement('div');
                        node.className = 'step-node';
                        const nailNum = Math.floor(Math.random() * 300) + 1;
                        node.innerHTML = `
                            <span class="step-index">${i}</span>
                            <span class="nail-number">${nailNum}</span>
                        `;
                        grid.appendChild(node);
                    }
                    pageWrapper.appendChild(grid);
                }
                master.appendChild(pageWrapper);
            }
        </script>

        <footer class="mt-8 pt-4 border-t text-center text-gray-400 text-[9px] no-print">
            <p>Optimized for Human Readability & High-Density Threading</p>
        </footer>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
